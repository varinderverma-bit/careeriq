/* ── Data Provenance Box ── */
function DataProvenanceBox({sources}){
  return (
    <div style={{marginTop:10,paddingTop:10,borderTop:'1px dashed #e2e8f0'}}>
      <div style={{display:'flex',alignItems:'center',gap:7,marginBottom:7}}>
        <span style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.08em'}}>Data Provenance</span>

      </div>
      {sources.map(s=>(

          <span style={{fontSize:9,fontWeight:700,padding:'2px 8px',borderRadius:4,flexShrink:0,marginTop:1,

}

/* ── MiniRing ── */
function MiniRing({v,size=44}){
  const r=16,circ=2*Math.PI*r,fill=(v/100)*circ,c=sc(v);
  return <svg width={size} height={size} viewBox="0 0 40 40">
    <circle cx="20" cy="20" r={r} fill="none" stroke="#e2e8f0" strokeWidth="3.5"/>
    <circle cx="20" cy="20" r={r} fill="none" stroke={c.hex} strokeWidth="3.5"
      strokeDasharray={`${fill} ${circ}`} strokeLinecap="round" transform="rotate(-90 20 20)"/>
    <text x="20" y="20" textAnchor="middle" dominantBaseline="middle" fontSize="9.5"
      fontWeight="700" fill="#1e293b" fontFamily="Inter,sans-serif">{v}</text>
  </svg>;
}

/* ── Big Gauge ── */
function BigGauge({v}){
  const r=50,circ=2*Math.PI*r,fill=(v/100)*circ,c=sc(v);
  return <svg width="130" height="130" viewBox="0 0 130 130">
    <circle cx="65" cy="65" r={r} fill="none" stroke="#f1f5f9" strokeWidth="10"/>
    <circle cx="65" cy="65" r={r} fill="none" stroke={c.hex} strokeWidth="10"
      strokeDasharray={`${fill} ${circ}`} strokeLinecap="round"
      transform="rotate(-90 65 65)" style={{filter:`drop-shadow(0 0 8px ${c.hex}55)`}}/>
    <text x="65" y="58" textAnchor="middle" fontSize="28" fontWeight="800" fill="#0f172a" fontFamily="Inter,sans-serif">{v}</text>
    <text x="65" y="76" textAnchor="middle" fontSize="10" fill="#94a3b8" fontFamily="Inter,sans-serif">/100</text>
    <text x="65" y="91" textAnchor="middle" fontSize="10" fill={c.hex} fontWeight="700" fontFamily="Inter,sans-serif">{c.label}</text>
  </svg>;
}

/* ── HPTI Semicircle Gauge ── */
function HptiGauge({trait}){
  const {l,v,zone,color,impl,develop}=trait;
  const cx=110,cy=90,r=65,W=220,H=110;
  const toRad=d=>d*Math.PI/180;
  const pt=s=>{const a=toRad(180-s*1.8);return[cx+r*Math.cos(a),cy-r*Math.sin(a)];};
  const arc=(s1,s2)=>{
    const [x1,y1]=pt(s1);
    const [x2,y2]=pt(Math.min(s2,99.9));
    return `M${x1.toFixed(1)} ${y1.toFixed(1)} A${r} ${r} 0 0 0 ${x2.toFixed(1)} ${y2.toFixed(1)}`;
  };
  const zones=[{f:0,t:25,c:'#fee2e2'},{f:25,t:60,c:'#fef9c3'},{f:60,t:80,c:'#d1fae5'},{f:80,t:100,c:'#ede9fe'}];
  const nRad=toRad(180-v*1.8);
  const nLen=r-14;
  const nX=(cx+nLen*Math.cos(nRad)).toFixed(1);
  const nY=(cy-nLen*Math.sin(nRad)).toFixed(1);
  const zs=zoneStyle(zone);
  return (
    <div className="card" style={{padding:'16px 10px 14px',textAlign:'center'}}>
      <svg width={W} height={H} viewBox={`0 0 ${W} ${H}`} style={{display:'block',margin:'0 auto'}}>
        {zones.map(z=><path key={z.f} d={arc(z.f,z.t)} fill="none" stroke={z.c} strokeWidth={14} strokeLinecap="butt"/>)}
        <path d={arc(0,v)} fill="none" stroke={color} strokeWidth={8} strokeLinecap="round" opacity="0.9"/>
        {[{lbl:'Low',mid:12},{lbl:'Moderate',mid:42},{lbl:'Optimal',mid:70},{lbl:'Excessive',mid:90}].map(({lbl,mid})=>{
          const a=toRad(180-mid*1.8);
          const lr=r+18;
          return <text key={lbl} x={(cx+lr*Math.cos(a)).toFixed(1)} y={(cy-lr*Math.sin(a)).toFixed(1)}
            textAnchor="middle" dominantBaseline="middle" fontSize="7" fill="#94a3b8" fontFamily="Inter,sans-serif">{lbl}</text>;
        })}
        <line x1={cx} y1={cy} x2={nX} y2={nY} stroke="#1e293b" strokeWidth="2.5" strokeLinecap="round"/>
        <circle cx={cx} cy={cy} r="5" fill="#1e293b"/>
        <circle cx={cx} cy={cy} r="2.5" fill="white"/>
        <text x={cx} y={cy-20} textAnchor="middle" fontSize="26" fontWeight="800" fill="#0f172a" fontFamily="Inter,sans-serif">{v}</text>
        <line x1={cx-r-6} y1={cy} x2={cx+r+6} y2={cy} stroke="#e2e8f0" strokeWidth="1"/>
      </svg>
      <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginTop:2}}>{l}</div>

/* ── TEIQue Radar (4 factors) ── */
function FactorRadar({factors}){
  const n=factors.length,cx=120,cy=110,r=80,size=240;
  const angle=i=>(i/n)*2*Math.PI-Math.PI/2;
  const pt=(val,i)=>{const a=angle(i),rv=(val/100)*r;return[cx+rv*Math.cos(a),cy+rv*Math.sin(a)];};
  const grid=[25,50,75,100];
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`} style={{display:'block',margin:'0 auto'}}>
      {grid.map(g=><polygon key={g}
        points={factors.map((_,i)=>{const[x,y]=pt(g,i);return`${x},${y}`}).join(' ')}
        fill="none" stroke="#e2e8f0" strokeWidth="1"/>)}
      {factors.map((_,i)=>{const[x,y]=pt(100,i);return<line key={i} x1={cx} y1={cy} x2={x} y2={y} stroke="#e2e8f0" strokeWidth="1"/>;} )}
      <polygon
        points={factors.map((f,i)=>{const[x,y]=pt(f.v,i);return`${x},${y}`}).join(' ')}
        fill="#4f46e5" fillOpacity="0.12" stroke="#4f46e5" strokeWidth="2.5" strokeLinejoin="round"/>
      {factors.map((f,i)=>{
        const[x,y]=pt(f.v,i);
        return <circle key={i} cx={x} cy={y} r="5" fill={f.color} stroke="white" strokeWidth="1.5"/>;
      })}
      {factors.map((f,i)=>{
        const lr=r+26,a=angle(i),lx=cx+lr*Math.cos(a),ly=cy+lr*Math.sin(a);
        return <text key={i} x={lx.toFixed(1)} y={ly.toFixed(1)} textAnchor="middle" dominantBaseline="middle"
          fontSize="11" fill="#475569" fontWeight="600" fontFamily="Inter,sans-serif">{f.l}</text>;
      })}
    </svg>
  );
}

                    <span style={{fontSize:12,color:'#374151'}}>{item.l}</span>
                    <span style={{fontSize:12,fontWeight:700,color:c.hex}}>{item.v}%</span>
                  </div>
                  <div style={{height:6,background:'#f1f5f9',borderRadius:3,overflow:'hidden'}}>
                    <div className="bar" style={{height:'100%',width:item.v+'%',background:c.hex,borderRadius:3}}/>
                  </div>
                </div>;
              })}
            </div>
          ))}
        </div>
      </div>

      {/* Role fit */}
      <div className="card" style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:10}}>High-Fit Roles (TEIQue-based)</div>
        <div style={{display:'flex',flexWrap:'wrap',gap:8}}>
          {data.roleFit.map(r=>(
            <span key={r} style={{fontSize:12,fontWeight:600,padding:'5px 12px',background:'#eef2ff',color:'#4338ca',borderRadius:8,border:'1px solid #c7d2fe'}}>{r}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── PPA TAB ── */
function PpaTab({data}){
  return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:16}}>
      {data.sourceInfo&&<AssessmentProvenance info={data.sourceInfo}/>}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Style */}
        <div className="card" style={{padding:20,borderTop:'3px solid #ec4899'}}>
          <div style={{fontSize:11,fontWeight:700,color:'#ec4899',textTransform:'uppercase',letterSpacing:'.08em',marginBottom:6}}>Behavioural Style</div>
          <div style={{fontSize:20,fontWeight:800,color:'#0f172a',marginBottom:8}}>{data.style}</div>
          <div style={{fontSize:13,color:'#475569',lineHeight:1.7}}>{data.selfImage}</div>
        </div>
        {/* Under pressure */}
        <div style={{display:'flex',flexDirection:'column',gap:14}}>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:6}}>Under Pressure</div>
            <div style={{fontSize:12,color:'#475569',lineHeight:1.6}}>{data.underPressure}</div>
          </div>
          <div className="card" style={{padding:16}}>
            <div style={{fontSize:12,fontWeight:700,color:'#0f172a',marginBottom:6}}>Work Mask</div>
            <div style={{fontSize:12,color:'#475569',lineHeight:1.6}}>{data.mask}</div>
          </div>
        </div>
      </div>

      {/* Motivators */}
      <div className="card" style={{padding:18}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:10}}>Motivators</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8}}>
          {data.motivators.map((m,i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:8,padding:'8px 10px',background:'#fdf2f8',borderRadius:8}}>
              <span style={{fontSize:14,flexShrink:0}}>{'🏆🤝💼🕊️'[i]}</span>
              <span style={{fontSize:12,color:'#374151',lineHeight:1.5}}>{m}</span>
            </div>
          ))}
        </div>
      </div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
        {/* Strengths */}
        <div className="card" style={{padding:18}}>
          <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:10}}>Strengths</div>
          <div style={{display:'flex',flexWrap:'wrap',gap:6}}>
            {data.strengths.map(s=>(
              <span key={s} style={{fontSize:11,fontWeight:600,padding:'3px 9px',background:'#f0fdf4',color:'#166534',borderRadius:6,border:'1px solid #bbf7d0'}}>{s}</span>
            ))}
          </div>
        </div>
        {/* Org value */}
        <div className="card" style={{padding:18}}>
          <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:10}}>Value to Organisation</div>
          {data.orgValue.map((v,i)=>(
            <div key={i} style={{display:'flex',alignItems:'flex-start',gap:7,marginBottom:7}}>
              <span style={{width:5,height:5,borderRadius:'50%',background:'#ec4899',marginTop:7,flexShrink:0}}/>
              <span style={{fontSize:12,color:'#374151',lineHeight:1.5}}>{v}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── HPTI TAB ── */
function HptiTab({traits,sourceInfo}){
  return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:20}}>
      {sourceInfo&&<AssessmentProvenance info={sourceInfo}/>}
      <div style={{padding:'14px 18px',background:'#f8fafc',border:'1px solid #e2e8f0',borderRadius:12,fontSize:13,color:'#475569',lineHeight:1.6}}>
        <strong style={{color:'#1e293b'}}>About HPTI: </strong>
        Six stable personality traits linked to senior leadership potential. Scores are classified as <em>Low, Moderate, Optimal,</em> or <em>Excessive</em> — each indicating different leadership implications. Traits are not predictive in isolation; success also depends on skills, motivation, and experience.
      </div>
      <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:16}}>
        {traits.map(t=><HptiGauge key={t.l} trait={t}/>)}
      </div>
      <div className="card" style={{padding:20}}>
        <div style={{fontSize:13,fontWeight:700,color:'#1e293b',marginBottom:12}}>Development Focus Areas</div>
        <div style={{display:'flex',flexDirection:'column',gap:10}}>
          {traits.map(t=>(
            <div key={t.l} style={{display:'flex',alignItems:'flex-start',gap:12,padding:'10px 14px',background:'#f8fafc',borderRadius:10,border:'1px solid #e2e8f0'}}>
              <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:6,flexShrink:0,marginTop:1,
                background:zoneStyle(t.zone).bg,color:zoneStyle(t.zone).tc}}>{t.zone}</span>
              <div>
                <div style={{fontSize:12,fontWeight:700,color:'#1e293b',marginBottom:2}}>{t.l}</div>
                <div style={{fontSize:12,color:'#64748b',lineHeight:1.5}}>{t.develop}</div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── DEVELOPMENT TAB ── */
function DevTab({c}){
  const devItems = c.teique ? c.teique.dev : [];
  const hptiItems = c.hpti ? c.hpti.filter(t=>t.zone==='Excessive'||t.zone==='Low'||t.v<65) : [];
  return (
    <div className="fade" style={{display:'flex',flexDirection:'column',gap:20}}>
      {devItems.length>0&&(
        <div>
          <div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:12}}>TEIQue — Priority Development Areas</div>
          <div style={{display:'flex',flexDirection:'column',gap:12}}>
            {devItems.map((d,i)=>{
              const cs=sc(d.v);
              return (
                <div key={i} className="card" style={{padding:18,borderLeft:`4px solid ${cs.hex}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:8}}>
                    <span style={{fontSize:20,fontWeight:800,color:cs.hex}}>{d.v}%</span>
                    <div style={{fontSize:14,fontWeight:700,color:'#1e293b'}}>{d.area}</div>
                    <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,
                      background:cs.bg,color:cs.tc,marginLeft:'auto'}}>{cs.label}</span>
                  </div>
                  <div style={{height:6,background:'#f1f5f9',borderRadius:3,overflow:'hidden',marginBottom:10}}>
                    <div className="bar" style={{height:'100%',width:d.v+'%',background:cs.hex,borderRadius:3}}/>
                  </div>
                  <div style={{fontSize:12,color:'#475569',lineHeight:1.6,padding:'10px 12px',background:'#f8fafc',borderRadius:8}}>
                    <strong style={{color:'#374151'}}>Action: </strong>{d.action}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {hptiItems.length>0&&(
        <div>
          <div style={{fontSize:14,fontWeight:700,color:'#1e293b',marginBottom:12}}>HPTI — Leadership Development Focus</div>
          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            {hptiItems.map(t=>{
              const zs=zoneStyle(t.zone);
              return (
                <div key={t.l} className="card" style={{padding:16,borderLeft:`4px solid ${zs.hex}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:8}}>
                    <span style={{fontSize:18,fontWeight:800,color:zs.hex}}>{t.v}</span>
                    <div style={{fontSize:13,fontWeight:700,color:'#1e293b'}}>{t.l}</div>
                    <span style={{fontSize:11,fontWeight:700,padding:'2px 8px',borderRadius:20,
                      background:zs.bg,color:zs.tc,marginLeft:'auto'}}>{t.zone}</span>
                  </div>
                  <div style={{fontSize:12,color:'#475569',lineHeight:1.6,padding:'10px 12px',background:'#f8fafc',borderRadius:8}}>
                    <strong style={{color:'#374151'}}>Action: </strong>{t.develop}
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
      {/* Recommended program */}
      <div style={{background:'linear-gradient(135deg,#4f46e5,#7c3aed)',borderRadius:14,padding:20,color:'#fff'}}>
        <div style={{fontWeight:700,fontSize:15,marginBottom:8}}>Recommended Development Program</div>
        <div style={{color:'#c7d2fe',fontSize:13,lineHeight:1.7}}>
          {c.teique
            ? '6–8 coaching sessions focused on emotion management and assertiveness. Pair with a 360° feedback pulse at 3 months to measure behavioural change. Leverage empathy and expression for modelling desired behaviours.'
            : 'Structured decision-making frameworks to channel bold risk appetite. Leadership empathy workshops to address potential detachment signals. Quarterly ambiguity navigation sessions for scaling environments.'}
        </div>
      </div>
    </div>
  );
}

/* ── PROFILE ── */
function Profile({c,onBack}){
  const tabs=[
    {id:'overview', l:'Overview'},
    ...(c.assessments.includes('teique')?[{id:'teique',l:'Emotional Intelligence'}]:[]),
    ...(c.assessments.includes('ppa')   ?[{id:'ppa',   l:'Behavioural Profile'}]:[]),
    ...(c.assessments.includes('hpti')  ?[{id:'hpti',  l:'Leadership Traits'}]:[]),
    {id:'dev', l:'Development Plan'},
  ];
  const [tab,setTab]=useState('overview');
  return (
    <div className="fade" style={{minHeight:'100%',background:'#f8fafc'}}>
      {/* Topbar */}
      <div style={{background:'#fff',borderBottom:'1px solid #e2e8f0',padding:'13px 32px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:10}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <button onClick={onBack} style={{display:'flex',alignItems:'center',gap:5,background:'none',border:'none',cursor:'pointer',color:'#64748b',fontSize:13,fontWeight:500,fontFamily:'Inter,sans-serif'}}>
            <Icon d={ICONS.back} size={16} color="#64748b"/> Dashboard
          </button>
          <Icon d={ICONS.next} size={14} color="#cbd5e1"/>
          <span style={{fontSize:13,fontWeight:700,color:'#0f172a'}}>{c.name}</span>
        </div>
        <div style={{display:'flex',gap:8}}>
          <button style={{padding:'8px 14px',background:'#fff',border:'1px solid #e2e8f0',borderRadius:8,fontSize:13,fontWeight:500,color:'#374151',cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
            Export Report
          </button>
          <button style={{display:'flex',alignItems:'center',gap:6,padding:'8px 16px',background:'#4f46e5',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer',fontFamily:'Inter,sans-serif'}}>
            <Icon d={ICONS.chat} size={15} color="#fff"/> Request Contact
          </button>
        </div>
      </div>

      <div style={{padding:'24px 32px',display:'flex',flexDirection:'column',gap:20,maxWidth:1200}}>
        {/* Hero */}
        <div className="card" style={{padding:24}}>
          <div style={{display:'flex',alignItems:'flex-start',gap:20}}>
            <div style={{width:72,height:72,borderRadius:18,background:c.color,display:'flex',alignItems:'center',justifyContent:'center',
              color:'#fff',fontWeight:800,fontSize:20,flexShrink:0,boxShadow:`0 6px 20px ${c.color}44`}}>
              {c.initials}
            </div>
            <div style={{flex:1}}>
              <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
                <div>
                  <div style={{fontSize:22,fontWeight:800,color:'#0f172a'}}>{c.name}</div>
                  <div style={{fontSize:14,color:'#475569',fontWeight:500,marginTop:3}}>{c.title}</div>
                  <div style={{display:'flex',gap:16,marginTop:6,fontSize:13,color:'#64748b'}}>
                    <span style={{display:'flex',alignItems:'center',gap:4}}><Icon d={ICONS.pin} size={14} color="#94a3b8"/>{c.loc}</span>
                    <span style={{display:'flex',alignItems:'center',gap:4}}><Icon d={ICONS.brief} size={14} color="#94a3b8"/>{c.exp} yrs experience</span>
                  </div>
                  <div style={{display:'flex',gap:6,marginTop:10}}>
                    {c.assessments.map(a=>(
                      <span key={a} style={{fontSize:11,fontWeight:700,padding:'3px 10px',borderRadius:6,
                        background:a==='teique'?'#eef2ff':a==='ppa'?'#fdf2f8':'#e0f2fe',
                        color:a==='teique'?'#4338ca':a==='ppa'?'#9d174d':'#0369a1',
                        border:`1px solid ${a==='teique'?'#c7d2fe':a==='ppa'?'#fbcfe8':'#bae6fd'}`}}>
                        {a==='teique'?'TEIQue Assessed':a==='ppa'?'PPA Assessed':'HPTI Assessed'}
                      </span>
                    ))}
                  </div>
                </div>
                <div style={{flexShrink:0,textAlign:'center'}}>
                  <BigGauge v={c.cis}/>
                  <div style={{fontSize:11,color:'#94a3b8',fontWeight:500,marginTop:2}}>Candidate Intelligence Score</div>
                </div>
              </div>
            </div>
          </div>
        </div>

        {/* Tab bar */}
        <div style={{display:'flex',background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:4,width:'fit-content',gap:2}}>
          {tabs.map(t=>(
            <button key={t.id} onClick={()=>setTab(t.id)}
              style={{padding:'8px 18px',borderRadius:9,border:'none',cursor:'pointer',fontSize:13,fontWeight:600,
                fontFamily:'Inter,sans-serif',background:tab===t.id?'#4f46e5':'transparent',
                color:tab===t.id?'#fff':'#64748b',transition:'all .15s'}}>
              {t.l}
            </button>
          ))}
        </div>

        {tab==='overview' && <OverviewTab c={c}/>}
        {tab==='teique'   && <TeIQueTab data={c.teique}/>}
        {tab==='ppa'      && <PpaTab data={c.ppa}/>}
        {tab==='hpti'     && <HptiTab traits={c.hpti} sourceInfo={c.hptiSourceInfo}/>}
        {tab==='dev'      && <DevTab c={c}/>}
      </div>
    </div>
  );
}

/* ── APP ── */
function App(){
  const[view,setView]=useState('dashboard');
  const[selected,setSelected]=useState(null);
  const select=c=>{setSelected(c);setView('profile');};
  const nav=v=>{setView(v);if(v!=='profile')setSelected(null);};
  return (
    <div style={{display:'flex',height:'100vh',overflow:'hidden',fontFamily:'Inter,sans-serif'}}>
      <Sidebar view={view} setView={nav}/>
      <main style={{flex:1,overflow:'auto'}}>
        {view==='profile'&&selected?<Profile c={selected} onBack={()=>nav('dashboard')}/>:<Dashboard onSelect={select}/>}
      </main>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
